version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: freight-postgres
    environment:
      POSTGRES_DB: freightdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pas123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg-isready -U admin -d freightdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freight_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: